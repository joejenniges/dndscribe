function renderHotwords(words) {
  hotwordsList.innerHTML = '';
  for (const word of words) {
    const item = document.createElement('div');
    item.className = 'hotword-item';

    const label = document.createElement('span');
    label.textContent = word;
    label.addEventListener('click', function() {
      // Replace label with edit input
      const input = document.createElement('input');
      input.className = 'hotword-edit-input';
      input.type = 'text';
      input.value = word;
      input.autocomplete = 'off';
      input.setAttribute('data-1p-ignore', '');
      input.setAttribute('data-lpignore', 'true');
      input.setAttribute('data-bwignore', '');
      item.replaceChild(input, label);
      input.focus();
      input.select();

      function finishEdit(save) {
        if (save) {
          const newWord = input.value.trim();
          if (newWord && newWord !== word) {
            editHotwordUI(word, newWord);
          } else {
            item.replaceChild(label, input);
          }
        } else {
          item.replaceChild(label, input);
        }
      }

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') finishEdit(true);
        if (e.key === 'Escape') finishEdit(false);
      });
      input.addEventListener('blur', function() { finishEdit(true); });
    });

    const removeBtn = document.createElement('button');
    removeBtn.className = 'hotword-remove';
    removeBtn.textContent = '\u00d7';
    removeBtn.addEventListener('click', function() { removeHotwordUI(word); });
    item.appendChild(label);
    item.appendChild(removeBtn);
    hotwordsList.appendChild(item);
  }
}

  try {
    var html = '';
    for (var j = 0; j < selectedIds.length; j++) {
      var sid = selectedIds[j];

          sessionName = allSessions[k].channelName || sessionName;
          break;
        }
      }

      if (j > 0) {
        html += '<div class="preview-separator">--- merge point ---</div>';
      }

      // Show last lines of this session (except for last session) and first lines (except for first session)
      if (j === 0) {
        // First session: show last few lines
        for (var m = 0; m < preview.last.length; m++) {
          var l = preview.last[m];
          html += previewLineHtml(l);
        }
        if (preview.first.length > 0 && preview.last.length > 0 && preview.first[0].id !== preview.last[0].id) {
          html = '<div class="preview-dots">...</div>' + html;
        }
      } else if (j === selectedIds.length - 1) {
        // Last session: show first few lines
        for (var m = 0; m < preview.first.length; m++) {
          var l = preview.first[m];
          html += previewLineHtml(l);
        }
        if (preview.first.length > 0 && preview.last.length > 0 && preview.first[preview.first.length-1].id !== preview.last[preview.last.length-1].id) {
          html += '<div class="preview-dots">...</div>';
        }
      } else {
        // Middle session: show first and last
        for (var m = 0; m < preview.first.length; m++) {
          var l = preview.first[m];
          html += previewLineHtml(l);
        }
        if (preview.first.length > 0 && preview.last.length > 0 && preview.first[preview.first.length-1].id !== preview.last[0].id) {
          html += '<div class="preview-dots">...</div>';
          for (var m = 0; m < preview.last.length; m++) {
            var l = preview.last[m];
            html += previewLineHtml(l);
          }
        }
      }
    }

    mergePreview.innerHTML = html || '<div style="color:#555;text-align:center;padding:20px;">Selected sessions have no transcriptions</div>';
  } catch (e) {
    mergePreview.innerHTML = '<div style="color:#e94560;padding:10px;">Error loading preview: ' + e.message + '</div>';
  }
}

mergeConfirmBtn.addEventListener('click', async function() {
  var items = mergeSessionList.querySelectorAll('.merge-session-item select');
  var selectedIds = [];
  for (var i = 0; i < items.length; i++) {
    var v = parseInt(items[i].value, 10);
    if (v) selectedIds.push(v);
  }
  var name = mergeNameInput.value.trim();
  if (selectedIds.length < 2 || !name) return;

  mergeConfirmBtn.disabled = true;
  mergeConfirmBtn.textContent = 'Merging...';

  try {
    var res = await fetch('/api/sessions/merge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionIds: selectedIds, name: name }),
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error);
    mergeModal.classList.remove('open');
    showToast('Sessions merged');
    currentSessionId = data.newSessionId;
    // Sessions list will update via WS broadcast
  } catch (e) {
    showToast('Merge failed: ' + e.message);
  } finally {
    mergeConfirmBtn.disabled = false;
    mergeConfirmBtn.textContent = 'Merge';
  }
});

// ---- WebSocket ----

function connect() {
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host);

  ws.onopen = function() {
    statusDot.classList.add('connected');
    statusText.textContent = 'Connected';
  };

  ws.onclose = function() {
    statusDot.classList.remove('connected');
    statusText.textContent = 'Disconnected';
    setTimeout(connect, 2000);
  };

  ws.onerror = function() { ws.close(); };

  ws.onmessage = function(event) {
    var msg = JSON.parse(event.data);

    switch (msg.type) {
      case 'init':
        renderSessions(msg.sessions);
        clearLines();
        for (var i = 0; i < msg.lines.length; i++) addLine(msg.lines[i]);
        applyCondensedView();
        renderHotwords(msg.hotwords);
        updateStatus(msg.status);
        renderMembers(msg.members);
        updateSaveRecordings(msg.saveRecordings);
        renderIgnoredUsers(msg.ignoredUsers);
        break;

      case 'line':
        addLine(msg.data);
        break;

      case 'edit':
        updateLineText(msg.data.id, msg.data.text, msg.data.audioFilenames);
        if (msg.data.autoAdded && msg.data.autoAdded.length > 0) {
          showToast('Auto-added hotword: ' + msg.data.autoAdded.join(', '));
        }
        break;

      case 'hotwords':
        renderHotwords(msg.data);
        break;

      case 'status':
        updateStatus(msg.data);
        break;

      case 'members':
        renderMembers(msg.data);
        break;

      case 'session_started':
        // Add new session to picker and switch to it
        var opt = document.createElement('option');
        opt.value = msg.data.id;
        opt.textContent = (msg.data.channelName || 'Session') + ' - ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) + ' (active)';
        sessionSelect.insertBefore(opt, sessionSelect.firstChild);
        currentSessionId = msg.data.id;
        sessionSelect.value = msg.data.id;
        clearLines();
        break;

      case 'delete':
        var delEl = linesEl.querySelector('.line[data-id="' + msg.data.id + '"]');
        if (delEl) delEl.remove();
        break;

      case 'sessions':
        renderSessions(msg.data);
        break;

      case 'reload_lines':
        clearLines();
        for (var rl = 0; rl < msg.data.length; rl++) addLine(msg.data[rl]);
        applyCondensedView();
        break;

      case 'save_recordings':
        updateSaveRecordings(msg.data);
        break;

      case 'ignored_users':
        renderIgnoredUsers(msg.data);
        break;

      case 'finalized':
        showToast('Transcription finalized and saved.');
        break;
    }
  };
}

connect();
</script>
